<head>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=IBM+Plex+Sans:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04050a;--bg2:#0d0f17;--bg3:#111420;--bg4:#161924;
  --border:#1a1d28;--border2:#252836;
  --teal:#00dcb4;--amber:#f0a500;--red:#e05050;--green:#4aaf70;--blue:#5090e0;--purple:#9b6dff;
  --mono:'Share Tech Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --title:'Orbitron',sans-serif;--raj:'Rajdhani',sans-serif;
}
html,body{background:var(--bg);color:#fff;font-family:var(--sans);min-height:100svh;}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border2);height:60px;
  padding:0 clamp(14px,3vw,28px);display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tlogo-wrap{display:flex;align-items:center;gap:clamp(10px,2vw,20px);}
.tlogo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.tlogo canvas{display:block;width:44px;height:44px;}
.tlogo-text{display:flex;flex-direction:column;}
.tlogo-main{font-family:var(--title);font-size:17px;font-weight:900;letter-spacing:.18em;color:#fff;line-height:1;}
.tlogo-main .o{color:var(--teal);}
.tlogo-sub{font-family:var(--mono);font-size:8px;color:var(--teal);letter-spacing:.22em;font-weight:700;margin-top:2px;}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-link{color:#fff;text-decoration:none;font-family:var(--mono);font-size:13px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;background:var(--border);border:1px solid var(--border2);
  padding:6px 14px;border-radius:7px;transition:all .18s;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.nav-link:hover{border-color:rgba(0,220,180,.55);color:var(--teal);background:rgba(0,220,180,.08);}
.nav-link.active{color:var(--teal);background:rgba(0,220,180,.08);border:1px solid rgba(0,220,180,.35);}
.nav-link.dashboard{font-size:16px;}
.topbar-center{display:flex;flex-direction:column;align-items:center;gap:1px;}
.topbar-time{font-family:var(--title);font-size:clamp(16px,2.5vw,22px);font-weight:900;color:var(--teal);letter-spacing:.12em;line-height:1;}
.topbar-date{font-family:var(--mono);font-size:clamp(9px,1.4vw,11px);color:#fff;font-weight:600;letter-spacing:.08em;}
.topbar-right{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
.role-badge{font-size:13px;font-family:var(--mono);background:var(--border);border:1px solid var(--border2);
  color:var(--green);padding:4px 11px;border-radius:4px;letter-spacing:.08em;font-weight:700;}
.coord-name-box{background:#0d2420;border:1.5px solid var(--teal);border-radius:8px;padding:3px 12px;text-align:center;line-height:1.25;}
.coord-name-box .first{font-family:var(--raj);font-size:12px;font-weight:600;color:#fff;display:block;letter-spacing:.1em;}
.coord-name-box .last{font-family:var(--raj);font-size:15px;font-weight:700;color:var(--teal);display:block;letter-spacing:.12em;}

/* PAGE */
.page{padding:clamp(16px,2.5vw,28px);max-width:1600px;margin:0 auto;}

/* SUMMARY STRIP */
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:30px;}
@media(max-width:800px){.summary-strip{grid-template-columns:1fr 1fr;}}
.sum-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 18px;position:relative;overflow:hidden;text-align:center;}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sum-card.c-teal::before{background:var(--teal);}
.sum-card.c-blue::before{background:var(--blue);}
.sum-card.c-amber::before{background:var(--amber);}
.sum-card.c-green::before{background:var(--green);}
.sum-lbl{font-family:var(--mono);font-size:18px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:7px;}
.sum-card.c-teal .sum-lbl{color:var(--teal);}
.sum-card.c-blue .sum-lbl{color:var(--blue);}
.sum-card.c-amber .sum-lbl{color:var(--amber);}
.sum-card.c-green .sum-lbl{color:var(--green);}
.sum-val{font-family:var(--title);font-size:clamp(28px,3.8vw,42px);font-weight:900;line-height:1;}
.sum-card.c-teal .sum-val{color:var(--teal);}
.sum-card.c-blue .sum-val{color:var(--blue);}
.sum-card.c-amber .sum-val{color:var(--amber);}
.sum-card.c-green .sum-val{color:var(--green);}
.sum-sub{font-family:var(--mono);font-size:22px;color:#fff;font-weight:600;margin-top:6px;}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.section-title{font-family:var(--title);font-size:clamp(10px,1.1vw,13px);font-weight:900;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);white-space:nowrap;}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,220,180,.4),transparent);}
.section-count{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;
  padding:3px 11px;border-radius:20px;white-space:nowrap;
  background:rgba(0,220,180,.07);border:1px solid rgba(0,220,180,.22);color:var(--teal);}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
@media(max-width:560px){.kpi-grid{grid-template-columns:1fr;}}

/* KPI CARD */
.kpi-card{
  background:var(--bg3);
  border:1px solid rgba(0,220,180,.14);
  border-radius:10px;overflow:hidden;position:relative;
  transition:border-color .2s,box-shadow .2s;
}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--teal);
}
.kpi-card:hover{
  border-color:rgba(0,220,180,.42);
  box-shadow:0 6px 28px rgba(0,0,0,.45),0 0 0 1px rgba(0,220,180,.07);
}

/* Card header */
.card-head{
  padding:16px 20px 14px;
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,220,180,.025);
}
.card-id{
  font-family:var(--title);font-weight:900;letter-spacing:.2em;
  font-size:clamp(22px,2.8vw,28px);line-height:1;color:var(--teal);
  text-shadow:0 0 22px rgba(0,220,180,.22);
}
.card-badge{
  font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:4px 9px;border-radius:12px;
  background:rgba(0,220,180,.08);border:1px solid rgba(0,220,180,.2);color:var(--teal);
}

/* Card body */
.card-body{padding:14px 20px 18px;}
.field-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.field-row:last-child{border-bottom:none;}
.field-lbl{
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:#fff;flex-shrink:0;padding-right:12px;font-size:18px;letter-spacing:.06em;
}
.field-val{font-family:var(--sans);font-size:30px;font-weight:700;text-align:right;}
.fv-inaltime{color:var(--teal);}
.fv-diametru{color:var(--blue);}
.fv-volum{color:var(--amber);}
.fv-cantitate{color:var(--green);}

/* TRADEMARK */
.trademark{text-align:center;padding:20px 0 10px;border-top:1px solid var(--border);margin-top:8px;}
.tm-name{font-family:var(--title);font-size:13px;font-weight:900;letter-spacing:4px;}
.tm-name .lc{color:var(--teal);}.tm-name .bg{color:#fff;}
.tm-email{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:2px;font-weight:600;margin-top:4px;}
.tm-copy{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;font-weight:600;margin-top:6px;}

@media print{
  .topbar{display:none!important;}
  body{background:#fff!important;color:#000!important;}
  .page{padding:0!important;max-width:100%!important;}
  .kpi-card{border:1px solid #ccc!important;break-inside:avoid;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tlogo-wrap">
    <a class="tlogo" href="dashboard.html">
      <canvas id="gear" width="88" height="88" style="width:44px;height:44px;"></canvas>
      <div class="tlogo-text">
        <div class="tlogo-main">KR<span class="o">O</span>NOS</div>
        <div class="tlogo-sub">Maintenance System</div>
      </div>
    </a>
    <nav class="nav-links">
      <a class="nav-link dashboard" href="dashboard.html">
        <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M1 5.5L6 1l5 4.5V11H8V8H4v3H1V5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        DASHBOARD
      </a>

<div class="page">

  <!-- SUMMARY -->
  <div class="summary-strip">

  <!-- SIR S2 -->

  </div>

  <div class="trademark">

  </div>

</div>

<script>
/* GEAR */
function drawGear(cv){const c=cv.getContext('2d'),W=cv.width,H=cv.height,cx=W/2,cy=H/2,s=W/300;const RT=126*s,RR=98*s,RI=78*s,TC='#00dcb4',OC='#ff8c00';function pt(r,a){return[cx+r*Math.sin(a),cy-r*Math.cos(a)];}c.clearRect(0,0,W,H);const grd=c.createRadialGradient(cx,cy,RI*.3,cx,cy,RT);grd.addColorStop(0,'#0e2420');grd.addColorStop(1,'#04080a');c.beginPath();for(let i=0;i<12;i++){const b=(i/12)*Math.PI*2,ta=.18,ra=.26;const a1=b-ra/2,a2=b-ta/2,a3=b+ta/2,a4=b+ra/2,a5=((i+1)/12)*Math.PI*2-ra/2;const[x0,y0]=pt(RR,a1),[x2,y2]=pt(RT,a2),[x3,y3]=pt(RT,a3),[x4,y4]=pt(RR,a4);if(!i)c.moveTo(x0,y0);else c.lineTo(x0,y0);c.lineTo(x2,y2);c.lineTo(x3,y3);c.lineTo(x4,y4);c.arc(cx,cy,RR,a4-Math.PI/2,a5-Math.PI/2,false);}c.closePath();c.fillStyle=grd;c.fill();c.strokeStyle=TC;c.lineWidth=2*s;c.lineJoin='round';c.shadowColor=TC;c.shadowBlur=10*s;c.stroke();c.shadowBlur=0;c.beginPath();c.arc(cx,cy,RI,0,Math.PI*2);const ig=c.createRadialGradient(cx,cy,0,cx,cy,RI);ig.addColorStop(0,'#0d201c');ig.addColorStop(1,'#050c0a');c.fillStyle=ig;c.fill();c.strokeStyle=TC;c.lineWidth=2.8*s;c.shadowColor=TC;c.shadowBlur=16*s;c.stroke();c.shadowBlur=0;c.beginPath();c.arc(cx,cy,RI-5*s,0,Math.PI*2);c.strokeStyle='rgba(0,220,180,.2)';c.lineWidth=.8*s;c.stroke();for(let m=0;m<60;m++){const a=(m/60)*Math.PI*2,isH=m%5===0,isQ=m%15===0;const r1=RI-(isQ?5:isH?4:2)*s,r2=RI-(isQ?18:isH?14:8)*s;const[x1,y1]=pt(r1,a),[x2,y2]=pt(r2,a);c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.strokeStyle=isQ?TC:isH?'rgba(0,220,180,.75)':'rgba(0,220,180,.3)';c.lineWidth=(isQ?2.5:isH?1.8:.9)*s;c.lineCap='round';c.shadowColor=isQ||isH?TC:'transparent';c.shadowBlur=isQ?7*s:isH?3*s:0;c.stroke();c.shadowBlur=0;}const now=new Date(),ms=now.getMilliseconds(),secs=now.getSeconds()+ms/1000,mins=now.getMinutes()+secs/60,hrs=(now.getHours()%12)+mins/60;[[RI*.48,(hrs/12)*Math.PI*2,5*s,TC,10*s],[RI*.70,(mins/60)*Math.PI*2,3*s,TC,7*s]].forEach(([r,a,lw,col,bl])=>{const[px,py]=pt(r,a);c.beginPath();c.moveTo(cx,cy);c.lineTo(px,py);c.strokeStyle=col;c.lineWidth=lw;c.lineCap='round';c.shadowColor=col;c.shadowBlur=bl;c.stroke();c.shadowBlur=0;});const sA=(secs/60)*Math.PI*2,[sx,sy]=pt(RI*.76,sA),[scx,scy]=pt(-RI*.22,sA);c.beginPath();c.moveTo(scx,scy);c.lineTo(sx,sy);c.strokeStyle=OC;c.lineWidth=1.5*s;c.lineCap='round';c.shadowColor=OC;c.shadowBlur=7*s;c.stroke();c.shadowBlur=0;c.beginPath();c.arc(cx,cy,6*s,0,Math.PI*2);c.fillStyle=TC;c.shadowColor=TC;c.shadowBlur=14*s;c.fill();c.shadowBlur=0;c.beginPath();c.arc(cx,cy,3*s,0,Math.PI*2);c.fillStyle='#04050a';c.fill();}
(function gl(){drawGear(document.getElementById('gear'));requestAnimationFrame(gl);})();

/* CLOCK */
function updateClock(){
  const now=new Date();
  const days=['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];
  const months=['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('top-time').textContent=
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  document.getElementById('top-date').textContent=
    days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
}
updateClock();setInterval(updateClock,1000);

/* USER */
(function(){
  try{
    const name=sessionStorage.getItem('k_name')||'Leica Bogdan';
    const role=sessionStorage.getItem('k_role')||'APP OWNER';
    const parts=name.split(' ');
    document.getElementById('user-first').textContent=parts[0]||'';
    document.getElementById('user-last').textContent=(parts.slice(1).join(' ')||'').toUpperCase();
    document.getElementById('user-role').textContent=role;
  }catch(e){}
})();

/* DATA */
const CELULE=[
  {id:'S11',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S12',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S13',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S14',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S15',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S16',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S21',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S22',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S23',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S24',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S25',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S26',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
];

function buildCard(c){
  return `<div class="kpi-card">
    <div class="card-head">
      <div class="card-id">${c.id}</div>
      <div class="card-badge">Siloz &middot; Receptie</div>
    </div>
    <div class="card-body">
      <div class="field-row">
        <div class="field-lbl">Inaltime</div>
        <div class="field-val fv-inaltime">${c.inaltime}</div>
      </div>
      <div class="field-row">
        <div class="field-lbl">Diametru</div>
        <div class="field-val fv-diametru">${c.diametru}</div>
      </div>
      <div class="field-row">
        <div class="field-lbl">Volum</div>
        <div class="field-val fv-volum">${c.volum}</div>
      </div>
      <div class="field-row">
        <div class="field-lbl">Capacitate</div>
        <div class="field-val fv-cantitate">${c.cantitate}</div>
      </div>
    </div>
  </div>`;
}

document.getElementById('grid-s1').innerHTML=CELULE.filter(c=>c.id.startsWith('S1')).map(buildCard).join('');
document.getElementById('grid-s2').innerHTML=CELULE.filter(c=>c.id.startsWith('S2')).map(buildCard).join('');
</script>
</body>
