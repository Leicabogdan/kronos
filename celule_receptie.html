<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KRONOS — Celule Receptie</title>
<script>(function(){if(!sessionStorage.getItem('k_name'))window.location.replace('index.html');})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=IBM+Plex+Sans:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04050a;--bg2:#0d0f17;--bg3:#111420;--bg4:#161924;
  --border:#1a1d28;--border2:#252836;
  --teal:#00dcb4;--amber:#f0a500;--red:#e05050;--green:#4aaf70;--blue:#5090e0;--purple:#9b6dff;
  --mono:'Share Tech Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --title:'Orbitron',sans-serif;--raj:'Rajdhani',sans-serif;
}
html,body{background:var(--bg);color:#fff;font-family:var(--sans);height:100%;overflow:hidden;}
.app{display:flex;height:100svh;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}








.topbar{
  height:56px;background:var(--bg2);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 clamp(16px,2.5vw,28px);
  gap:12px;flex-shrink:0;
}
.topbar-title{font-family:var(--title);font-size:clamp(14px,2vw,17px);font-weight:900;color:#fff;letter-spacing:.12em;}
.topbar-sub{font-family:var(--sans);font-size:clamp(11px,1.5vw,13px);color:#fff;font-weight:700;margin-top:2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-date{font-family:var(--sans);font-size:14px;color:#fff;font-weight:600;margin-bottom:3px;}
.topbar-time{font-family:var(--title);font-size:22px;color:var(--teal);font-weight:900;letter-spacing:.08em;line-height:1;}
.notif-btn{
  width:34px;height:34px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;position:relative;
}
.notif-btn:hover{border-color:rgba(0,220,180,.4);}
.notif-dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;
  border-radius:50%;background:var(--red);
  box-shadow:0 0 8px var(--red);
}
.content{flex:1;overflow-y:auto;padding:clamp(8px,1.5vw,16px);scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
@media(max-width:900px){
  [style*="grid-template-columns:1fr 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important;}
  [style*="grid-template-columns:1fr 300px"]{grid-template-columns:1fr!important;}
}
@media(max-width:700px){
  [style*="grid-template-columns:1fr 1fr 1fr 1fr"]{grid-template-columns:1fr!important;}
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important;}
  .content{padding:10px!important;}
}

/* TOPBAR */






















/* PAGE */
.page{padding:clamp(10px,1.5vw,18px) clamp(8px,1.5vw,16px);max-width:100%;margin:0;}

/* SUMMARY STRIP */
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:800px){.summary-strip{grid-template-columns:1fr 1fr;}}
.sum-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;position:relative;overflow:hidden;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sum-card.c-teal::before{background:var(--teal);}
.sum-card.c-blue::before{background:var(--blue);}
.sum-card.c-amber::before{background:var(--amber);}
.sum-card.c-green::before{background:var(--green);}
.sum-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
.sum-card.c-teal .sum-lbl{color:var(--teal);}
.sum-card.c-blue .sum-lbl{color:var(--blue);}
.sum-card.c-amber .sum-lbl{color:var(--amber);}
.sum-card.c-green .sum-lbl{color:var(--green);}
.sum-val{font-family:var(--title);font-size:clamp(18px,2.2vw,26px);font-weight:900;line-height:1;}
.sum-card.c-teal .sum-val{color:var(--teal);}
.sum-card.c-blue .sum-val{color:var(--blue);}
.sum-card.c-amber .sum-val{color:var(--amber);}
.sum-card.c-green .sum-val{color:var(--green);}
.sum-sub{font-family:var(--mono);font-size:13px;color:#fff;font-weight:600;margin-top:4px;}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.section-title{font-family:var(--title);font-size:clamp(10px,1.1vw,13px);font-weight:900;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);white-space:nowrap;}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,220,180,.4),transparent);}
.section-count{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;
  padding:3px 11px;border-radius:20px;white-space:nowrap;
  background:rgba(0,220,180,.07);border:1px solid rgba(0,220,180,.22);color:var(--teal);}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:20px;}


/* KPI CARD */
.kpi-card{
  background:var(--bg3);
  border:1px solid rgba(0,220,180,.14);
  border-radius:10px;overflow:hidden;position:relative;
  transition:border-color .2s,box-shadow .2s;
}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--teal);
}
.kpi-card:hover{
  border-color:rgba(0,220,180,.42);
  box-shadow:0 6px 28px rgba(0,0,0,.45),0 0 0 1px rgba(0,220,180,.07);
}

/* Card header */
.card-head{
  padding:8px 10px;
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,220,180,.025);
}
.card-id{
  font-family:var(--title);font-weight:900;letter-spacing:.1em;
  font-size:clamp(11px,1.3vw,18px);line-height:1;color:var(--teal);
  text-shadow:0 0 22px rgba(0,220,180,.22);
}
.card-badge{
  font-family:var(--mono);font-size:clamp(7px,0.7vw,10px);font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;padding:2px 5px;border-radius:8px;
  background:rgba(0,220,180,.08);border:1px solid rgba(0,220,180,.2);color:var(--teal);
}

/* Card body */
.card-body{padding:6px 10px 10px;}
.field-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.field-row:last-child{border-bottom:none;}
.field-lbl{
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:#fff;flex-shrink:0;padding-right:6px;
  font-size:clamp(8px,0.9vw,11px);
}
.field-val{font-family:var(--sans);font-size:clamp(11px,1.1vw,16px);font-weight:700;text-align:right;}
.fv-inaltime{color:var(--teal);}
.fv-diametru{color:var(--blue);}
.fv-volum{color:var(--amber);}
.fv-cantitate{color:var(--green);}

/* TRADEMARK */
.trademark{text-align:center;padding:20px 0 10px;border-top:1px solid var(--border);margin-top:8px;}
.tm-name{font-family:var(--title);font-size:13px;font-weight:900;letter-spacing:4px;}
.tm-name .lc{color:var(--teal);}.tm-name .bg{color:#fff;}
.tm-email{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:2px;font-weight:600;margin-top:4px;}
.tm-copy{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;font-weight:600;margin-top:6px;}

@media print{
  .kronos-sidebar,.sb-overlay{display:none!important;}
  .app{display:block!important;}
  .main{display:block!important;overflow:visible!important;height:auto!important;}
  .content{overflow:visible!important;height:auto!important;}
  
  body{background:#fff!important;color:#000!important;}
  .page{padding:0!important;max-width:100%!important;}
  .kpi-card{border:1px solid #ccc!important;break-inside:avoid;}
}
</style>
</head>
<body>
<div class="app">

<script src="sidebar.js" data-active="CELULE_RECEPTIE"></script>

<div class="main">
  <div class="topbar">
      <div style="display:none;cursor:pointer;padding:4px;" id="mobile-menu-btn" onclick="sbOpenMobile()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="topbar-title">CELULE RECEPTIE</div>

  <div class="content">

  <!-- SUMMARY -->

</div>

<script>
/* GEAR */


/* CLOCK */


/* USER */
(function(){
  try{
    const name=sessionStorage.getItem('k_name')||'Leica Bogdan';
    const role=sessionStorage.getItem('k_role')||'APP OWNER';
    const parts=name.split(' ');
    document.getElementById('user-first').textContent=parts[0]||'';
    document.getElementById('user-last').textContent=(parts.slice(1).join(' ')||'').toUpperCase();
    document.getElementById('user-role').textContent=role;
  }catch(e){}
})();

/* DATA */
const CELULE=[
  {id:'S11',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S12',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S13',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S14',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S15',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S16',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S21',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S22',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S23',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S24',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S25',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
  {id:'S26',inaltime:'34 m',diametru:'22 m',volum:'11,390 m\u00B3',cantitate:'8,543 t'},
];

function buildCard(c){
  return `<div class="kpi-card">
    <div class="card-head">
      <div class="card-id">${c.id}</div>
      <div class="card-badge">Siloz &middot; Receptie</div>
    </div>
    <div class="card-body">
      <div class="field-row">
        <div class="field-lbl">Inaltime</div>
        <div class="field-val fv-inaltime">${c.inaltime}</div>
      </div>
      <div class="field-row">
        <div class="field-lbl">Diametru</div>
        <div class="field-val fv-diametru">${c.diametru}</div>
      </div>
      <div class="field-row">
        <div class="field-lbl">Volum</div>
        <div class="field-val fv-volum">${c.volum}</div>
      </div>
      <div class="field-row">
        <div class="field-lbl">Capacitate</div>
        <div class="field-val fv-cantitate">${c.cantitate}</div>
      </div>
    </div>
  </div>`;
}

document.getElementById('grid-s1').innerHTML=CELULE.filter(c=>c.id.startsWith('S1')).map(buildCard).join('');
document.getElementById('grid-s2').innerHTML=CELULE.filter(c=>c.id.startsWith('S2')).map(buildCard).join('');

function updateClock(){var now=new Date();var days=['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];var months=['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];var te=document.getElementById('top-time');var de=document.getElementById('top-date');if(te)te.textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');if(de)de.textContent=days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();}
updateClock();setInterval(updateClock,1000);
function checkMobile(){var mb=document.getElementById('mobile-menu-btn');if(mb){if(window.innerWidth<=700)mb.style.display='block';else mb.style.display='none';}}
checkMobile();window.addEventListener('resize',checkMobile);
</script>
