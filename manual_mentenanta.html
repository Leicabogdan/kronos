*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04050a;--bg2:#0d0f17;--bg3:#111420;--bg4:#161924;
  --border:#1a1d28;--border2:#252836;

}
html,body{background:var(--bg);color:#fff;font-family:var(--sans);height:100%;overflow:hidden;}
.app{display:flex;height:100svh;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}








.topbar{
  height:56px;background:var(--bg2);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 clamp(16px,2.5vw,28px);
  gap:12px;flex-shrink:0;
}
.topbar-title{font-family:var(--title);font-size:clamp(14px,2vw,17px);font-weight:900;color:#fff;letter-spacing:.12em;}
.topbar-sub{font-family:var(--sans);font-size:clamp(11px,1.5vw,13px);color:#fff;font-weight:700;margin-top:2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-date{font-family:var(--sans);font-size:14px;color:#fff;font-weight:600;margin-bottom:3px;}
.topbar-time{font-family:var(--title);font-size:22px;color:var(--teal);font-weight:900;letter-spacing:.08em;line-height:1;}
.notif-btn{
  width:34px;height:34px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;position:relative;
}
.notif-btn:hover{border-color:rgba(0,220,180,.4);}
.notif-dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;
  border-radius:50%;background:var(--red);
  box-shadow:0 0 8px var(--red);
}
.content{flex:1;overflow-y:auto;padding:clamp(14px,2vw,24px) clamp(14px,2.5vw,28px);scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
@media(max-width:900px){
  [style*="grid-template-columns:1fr 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important;}
  [style*="grid-template-columns:1fr 300px"]{grid-template-columns:1fr!important;}
}
@media(max-width:700px){
  [style*="grid-template-columns:1fr 1fr 1fr 1fr"]{grid-template-columns:1fr!important;}
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important;}
  .content{padding:10px!important;}
}

/* ── PAGE ── */

/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}

@media(max-width:600px){.kpi-strip{grid-template-columns:1fr;}}
.kpi-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;

.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card.c-teal::before{background:var(--teal);}
.kpi-card.c-blue::before{background:var(--blue);}
.kpi-card.c-amber::before{background:var(--amber);}
.kpi-card.c-purple::before{background:var(--purple);}
.kpi-card.c-teal{border-color:rgba(0,220,180,.15);}
.kpi-card.c-blue{border-color:rgba(80,144,224,.15);}
.kpi-card.c-amber{border-color:rgba(240,165,0,.15);}
.kpi-card.c-purple{border-color:rgba(155,109,255,.15);}
.kpi-card:hover,.kpi-card.active{transform:translateY(-2px);}
.kpi-card.c-teal:hover,.kpi-card.c-teal.active{border-color:rgba(0,220,180,.45);box-shadow:0 6px 24px rgba(0,220,180,.12);}
.kpi-card.c-blue:hover,.kpi-card.c-blue.active{border-color:rgba(80,144,224,.45);box-shadow:0 6px 24px rgba(80,144,224,.12);}
.kpi-card.c-amber:hover,.kpi-card.c-amber.active{border-color:rgba(240,165,0,.45);box-shadow:0 6px 24px rgba(240,165,0,.12);}
.kpi-card.c-purple:hover,.kpi-card.c-purple.active{border-color:rgba(155,109,255,.45);box-shadow:0 6px 24px rgba(155,109,255,.12);}
.kpi-lbl{font-family:var(--title);font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;opacity:.7;margin-bottom:8px;}
.kpi-card.c-teal .kpi-lbl{color:var(--teal);}
.kpi-card.c-blue .kpi-lbl{color:var(--blue);}
.kpi-card.c-amber .kpi-lbl{color:var(--amber);}
.kpi-card.c-purple .kpi-lbl{color:var(--purple);}
.kpi-val{font-family:var(--title);font-size:clamp(24px,3vw,36px);font-weight:900;line-height:1;}
.kpi-card.c-teal .kpi-val{color:var(--teal);}
.kpi-card.c-blue .kpi-val{color:var(--blue);}
.kpi-card.c-amber .kpi-val{color:var(--amber);}
.kpi-card.c-purple .kpi-val{color:var(--purple);}
.kpi-sub{font-family:var(--sans);font-size:12px;font-weight:600;margin-top:6px;}
.kpi-card.c-teal .kpi-sub{color:var(--teal);}
.kpi-card.c-blue .kpi-sub{color:var(--blue);}
.kpi-card.c-amber .kpi-sub{color:var(--amber);}
.kpi-card.c-purple .kpi-sub{color:var(--purple);}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;width:100%;}

.count-badge{font-family:var(--mono);font-size:12px;color:var(--teal);font-weight:700;}

/* ── TABLE ── */
.table-wrap{border:1.5px solid rgba(0,220,180,.3);border-radius:10px;overflow:hidden;overflow-x:auto;margin-bottom:24px;width:100%;}
table{width:100%;border-collapse:collapse;font-family:var(--sans);}
thead tr th{font-family:var(--sans);font-size:13px;color:#fff;letter-spacing:.04em;text-transform:uppercase;

thead tr th:hover{color:var(--teal);background:rgba(0,220,180,.06);}
thead tr th.sort-asc::after{content:' \2191';color:var(--teal);}
thead tr th.sort-desc::after{content:' \2193';color:var(--teal);}
thead tr th:last-child{border-right:none;}
tbody tr{transition:background .1s;}
tbody tr:nth-child(odd){background:var(--bg3);}
tbody tr:nth-child(even){background:var(--bg4);}
tbody tr:hover{background:rgba(0,220,180,.04)!important;}

function updateKPI(){
  document.getElementById('k-proceduri').textContent   = allDocs.filter(function(d){return d.cat==='proceduri';}).length;
  document.getElementById('k-anexe').textContent       = allDocs.filter(function(d){return d.cat==='anexe';}).length;
  document.getElementById('k-formulare').textContent   = allDocs.filter(function(d){return d.cat==='formulare';}).length;
  document.getElementById('k-instructiuni').textContent= allDocs.filter(function(d){return d.cat==='instructiuni';}).length;
}

/* ── FILTER ── */
var FILTER_COLORS = {proceduri:'teal',anexe:'blue',formulare:'amber',instructiuni:'purple',all:'teal'};

function setFilter(cat){
  currentFilter = cat;
  // Update KPI cards active state
  ['proceduri','anexe','formulare','instructiuni'].forEach(function(k){
    var el = document.getElementById('kpi-'+k);
    if(el) el.classList.toggle('active', k===cat);
  });
  // Update toolbar buttons
  ['all','proceduri','anexe','formulare','instructiuni'].forEach(function(k){
    var btn = document.getElementById('btn-'+k);
    if(!btn) return;
    btn.className = 'filter-tag';
    if(k===cat) btn.classList.add('active-'+(FILTER_COLORS[k]||'teal'));
  });
  applyFilters();
}

function applyFilters(){
  var q = (document.getElementById('search-input').value||'').toLowerCase().trim();
  filteredDocs = allDocs.filter(function(d){
    if(currentFilter !== 'all' && d.cat !== currentFilter) return false;
    if(q && !(d.denumire.toLowerCase().includes(q) || d.cod.toLowerCase().includes(q) || d.revizia.toLowerCase().includes(q))) return false;
    return true;
  });
  renderTable();
}

/* ── SORT ── */
function sortBy(col){
  document.querySelectorAll('thead th').forEach(function(t){t.classList.remove('sort-asc','sort-desc');});
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
  var ths=document.querySelectorAll('thead th');
  if(ths[col]) ths[col].classList.add(sortDir===1?'sort-asc':'sort-desc');
  renderTable();
}

/* ── RENDER ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderTable(){
  var rows = filteredDocs.slice();
  if(sortCol >= 0){
    var keys = ['denumire','cod','revizia','data','cat'];
    var key = keys[sortCol] || 'denumire';
    rows.sort(function(a,b){
      var va=String(a[key]||''), vb=String(b[key]||'');
      if(va<vb) return -sortDir; if(va>vb) return sortDir; return 0;
    });
  }
  var cb = document.getElementById('count-badge');
  if(cb) cb.textContent = rows.length + ' documente';
  var tbody = document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="5" class="no-data">Niciun document gasit.</td></tr>';
    return;
  }
  var html='';
  rows.forEach(function(d){
    var cfg = CAT_CFG[d.cat] || {label:d.cat, cls:'cat-teal'};
      var pdfLink=d.cod.replace(/\s+/g,'_')+'.pdf';
      html+='<tr>'
      +'<td class="td-denumire"><a href="'+pdfLink+'" target="_blank" style="color:#fff;text-decoration:none;" onmouseover="this.style.color=\'var(--teal)\'" onmouseout="this.style.color=\'#fff\'">'+esc(d.denumire)+' <svg style="vertical-align:middle;opacity:.5;" width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 9L9 2M9 2H4M9 2v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></a></td>'
      +'<td class="td-cod">'+esc(d.cod)+'</td>'
      +'<td class="td-revizie">'+esc(d.revizia)+'</td>'
      +'<td class="td-data">'+esc(d.data)+'</td>'
      +'<td style="text-align:center;"><span class="cat-badge '+cfg.cls+'">'+cfg.label+'</span></td>'
      +'</tr>';
  });
  tbody.innerHTML = html;
}

/* ── INIT ── */
updateKPI();
setFilter('all');

function updateClock(){var now=new Date();var days=['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];var months=['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];var te=document.getElementById('top-time');var de=document.getElementById('top-date');if(te)te.textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');if(de)de.textContent=days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();}
updateClock();setInterval(updateClock,1000);
function checkMobile(){var mb=document.getElementById('mobile-menu-btn');if(mb){if(window.innerWidth<=700)mb.style.display='block';else mb.style.display='none';}}
checkMobile();window.addEventListener('resize',checkMobile);
</script>
